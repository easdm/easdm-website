<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EAS — Platform Maintenance</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
    
    body {
      margin: 0;
      padding: 0;
      background-color: #050B14;
      color: #F8FAFC;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background glow */
    .glow-bg {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0, 102, 204, 0.15) 0%, rgba(9, 17, 30, 0) 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      animation: float-glow 8s ease-in-out infinite alternate;
    }

    @keyframes float-glow {
      0% { transform: translate(-55%, -45%) scale(0.9); }
      100% { transform: translate(-45%, -55%) scale(1.1); }
    }

    /* Grid layout background */
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse at center, black 60%, transparent 100%);
      z-index: 2;
    }

    /* Maintenance Card */
    .card {
      background: rgba(10, 26, 47, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 48px;
      max-width: 480px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      z-index: 10;
      position: relative;
      margin: 20px;
    }

    /* Concentric SVG spinner */
    .spinner-container {
      margin-bottom: 32px;
      display: flex;
      justify-content: center;
    }

    .core-spinner {
      animation: spin 16s linear infinite;
    }

    .outer-spinner {
      animation: spin-reverse 20s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    @keyframes spin-reverse {
      100% { transform: rotate(-360deg); }
    }

    h1 {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin: 0 0 12px 0;
      background: linear-gradient(135deg, #FFFFFF 0%, #E2E8F0 50%, #009BFF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .badge {
      display: inline-block;
      background: rgba(0, 229, 255, 0.1);
      border: 1px solid rgba(0, 229, 255, 0.2);
      color: #00E5FF;
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 0.15em;
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 24px;
    }

    p {
      color: #94A3B8;
      font-size: 14px;
      line-height: 1.6;
      margin: 0 0 32px 0;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #0066CC;
      color: #FFFFFF;
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
      padding: 14px 28px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0, 102, 204, 0.2);
    }

    .btn:hover {
      background: #009BFF;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 155, 255, 0.3);
    }

    .footer-text {
      position: absolute;
      bottom: 24px;
      font-size: 11px;
      color: #475569;
      z-index: 10;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="glow-bg"></div>
  <div class="grid-bg"></div>

  <div class="card">
    <div class="spinner-container">
      <svg width="80" height="80" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer Concentric -->
        <circle class="outer-spinner" cx="50" cy="50" r="40" stroke="#009BFF" stroke-width="1.5" stroke-dasharray="12 18" style="transform-origin: 50px 50px;" />
        <!-- Inner Concentric -->
        <circle class="core-spinner" cx="50" cy="50" r="28" stroke="#00E5FF" stroke-width="2" stroke-dasharray="25 15 5 10" style="transform-origin: 50px 50px;" />
        <circle cx="50" cy="50" r="16" stroke="#0066CC" stroke-width="1" stroke-dasharray="4 4" />
        <!-- Center Core Glow -->
        <circle cx="50" cy="50" r="8" fill="#00E5FF" />
      </svg>
    </div>

    <div class="badge">Scheduled System Upgrades</div>
    <h1>EAS Platform Maintenance</h1>
    <p>
      The Enterprise Application Solutions portal is currently undergoing scheduled updates to integrate advanced AI capabilities. Support channels remain fully active.
    </p>

    <a href="mailto:support@easdm.com" class="btn">
      Contact Helpdesk
    </a>
  </div>

  <div class="footer-text">
    © 2026 EAS — Enterprise Application Solutions
  </div>

</body>
</html>
